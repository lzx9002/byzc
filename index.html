    <script>
        layui.use(function(){
            var carousel = layui.carousel;
            var layer = layui.layer;
            var util = layui.util;
            // const img = $(".btn")
            // var width = img[0].width //获取图片宽度
            // var height = img[0].height //获取图片高度
            const width = 1600;
            const height = 837;

            // 渲染 - 图片轮播
            carousel.render({
                elem: '#carousel-screenshots-image',
                width: width,
                height: height,
                interval: 3000
            });
            const data = [
                {
                    "alt": "1",
                    "pid": 1,
                    "src": "/img/figure/1.png",
                },
                {
                    "alt": "2",
                    "pid": 2,
                    "src": "/img/figure/2.png",
                },
                {
                    "alt": "3",
                    "pid": 3,
                    "src": "/img/figure/3.png",
                },
                {
                    "alt": "4",
                    "pid": 4,
                    "src": "/img/figure/4.png",
                }
            ];
            util.on('lay-img-alt', {
                1: function () {
                    layer.photos({
                        photos: {
                            'title': '1',
                            'start': 1,
                            'data': data
                        }}
                    );
                },
                2: function () {
                    layer.photos({
                        photos: {
                            'title': '2',
                            'start': 2,
                            'data': data
                        }}
                    );
                },
                3: function () {
                    layer.photos({
                        photos: {
                            'title': '3',
                            'start': 3,
                            'data': data
                        }}
                    );
                },
                4: function () {
                    layer.photos({

                        }}
